[project]
name = "civicmesh"
version = "1.0.0"
entry = "app.jac"

[dependencies.npm]
d3 = "latest"
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[plugins.byllm.model]
default_model = "nvidia_nim/meta/llama-3.1-8b-instruct"
temperature = 0.2

# Featherless.AI fallback. Featherless gives us flat-rate access to 30k+
# open-source models under a single API key, so if NVIDIA NIM rate-limits
# or drops, byllm transparently retries against meta-llama/Llama-3.1-8B
# on Featherless. Set FEATHERLESS_API_KEY in .env to enable. JacHacks
# "Best Use of Featherless.AI" sponsor prize incentivized the integration.
[[plugins.byllm.fallback_models]]
model = "featherless_ai/meta-llama/Llama-3.1-8B-Instruct"
temperature = 0.2

[plugins.byllm.fallback]
strategy = "fallback"
num_retries = 2
timeout = 120.0

[plugins.byllm.compaction]
enabled = true
threshold_ratio = 0.8
keep_recent_iterations = 3

[plugins.scale.server]
port = 7860
host = "0.0.0.0"

[plugins.scale.metrics]
enabled = true

[plugins.client]

[serve]
base_route_app = "app"
