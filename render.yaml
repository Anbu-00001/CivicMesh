# Render Blueprint for CivicMesh.
#
# Single Docker web service, free plan. Render injects PORT into the
# container at boot; the Dockerfile CMD reads ${PORT:-7860} so the same
# image runs on HF Spaces (7860), on Render ($PORT), and locally.
#
# Free-tier caveats baked into this config:
#   - Service sleeps after 15 min of no traffic. First request after
#     wake takes ~30s. The SQLite anchor store survives sleep/wake
#     because the container filesystem is preserved across that cycle.
#   - No persistent disk on free plan, so a `Manual Deploy → Clear
#     build cache & deploy` wipes the graph. SeedWalker is idempotent
#     and re-runs on first request, so the demo data comes back.
#
# To deploy: push to GitHub, then on Render: New → Blueprint → connect
# this repo. Render reads this file and creates the service.

services:
  - type: web
    name: civicmesh
    env: docker
    plan: free
    region: oregon         # change to your nearest: oregon | virginia | frankfurt | singapore
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # No healthCheckPath — Render defaults to TCP port scan, which gives
    # the deploy up to 15 min to bind the port. Jac takes ~60-90s on
    # cold boot (model init + graph seed), so the TCP scan is more
    # forgiving than an HTTP check against /docs.
    autoDeploy: true

    envVars:
      - key: NVIDIA_NIM_API_KEY
        sync: false          # set in the Render dashboard — NEVER commit
      - key: FEATHERLESS_API_KEY
        sync: false          # optional fallback; set if you have one
      - key: CIVICMESH_LOG_LEVEL
        value: info
      # PYTHONUNBUFFERED keeps `flyctl logs`-style streaming sane.
      - key: PYTHONUNBUFFERED
        value: "1"
